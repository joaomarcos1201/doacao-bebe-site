# ============================================================
# BANCO DE DADOS - SQL Server (Somee)
# Credenciais via variáveis de ambiente
# ============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlserver://doacao-bebe-site.mssql.somee.com:1433;databaseName=doacao-bebe-site;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:alemdopositivo}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:doacaobebe}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

# Naming strategy — mantém os nomes exatos das colunas do banco
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

# ============================================================
# SERVIDOR
# O Render injeta a porta via variável de ambiente PORT.
# O fallback 8080 é usado localmente se PORT não estiver definida.
# ============================================================
server.port=${PORT:8080}

# ============================================================
# EMAIL (Gmail)
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:alemdopositivo0225@gmail.com}
spring.mail.password=${MAIL_PASSWORD:vgiwdmvsfgkqyglz}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# ============================================================
# JWT
# ============================================================
jwt.secret=${JWT_SECRET:doacaoBebeSecretKey2024SuperSecureKeyForJWTAuthentication256Bits}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ============================================================
# UPLOAD DE ARQUIVOS
# ============================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================================
# JACKSON — evita erro de serialização de proxies Hibernate
# ============================================================
spring.jackson.serialization.fail-on-empty-beans=false

# ============================================================
# ERROS — mensagens detalhadas (pode desativar em produção)
# ============================================================
spring.jpa.properties.hibernate.generate_statistics=false
server.error.include-message=always
server.error.include-stacktrace=never
